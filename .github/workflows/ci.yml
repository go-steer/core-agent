name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      # Docs — the parallel ci-docs.yml emits matching green stubs
      # so required checks stay satisfied.
      - '**/*.md'
      # Image-build config — no Go code touched, so the Go test /
      # lint / vet / vuln pipeline can't be affected. release-images.yml
      # rebuilds on its own trigger; changes there don't need the
      # Go pipeline to re-run.
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/release*.yml'
      - '.github/workflows/docs*.yml'
      - '.github/workflows/pricing-regen.yml'
      # Docs-site sources — Astro/Starlight build lives outside this workflow.
      - 'docs/site/**'
      # License / config-only chores that can't affect Go.
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
  pull_request:
    branches: [main]
    paths-ignore:
      # Docs — the parallel ci-docs.yml emits matching green stubs
      # so required checks stay satisfied.
      - '**/*.md'
      # Image-build config — no Go code touched, so the Go test /
      # lint / vet / vuln pipeline can't be affected. release-images.yml
      # rebuilds on its own trigger; changes there don't need the
      # Go pipeline to re-run.
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/release*.yml'
      - '.github/workflows/docs*.yml'
      - '.github/workflows/pricing-regen.yml'
      # Docs-site sources — Astro/Starlight build lives outside this workflow.
      - 'docs/site/**'
      # License / config-only chores that can't affect Go.
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'

# Cancel in-progress runs when a new commit lands on the same branch
# so we don't queue stale tests.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.26'

# Each job below is a thin wrapper over a script under
# dev/ci/presubmits/. The same script is what `dev/tools/ci` runs
# locally, so a green local run is the same green run as remote CI.
# Keep the wiring boring — logic lives in dev/tools/, not in YAML.

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          # setup-go@v5 caches ~/go/pkg/mod + ~/.cache/go-build using a
          # key derived from go.sum. Letting it own those paths avoids
          # the `tar: File exists` collision an explicit actions/cache@v4
          # caused when both tried to restore the same directories.
          cache-dependency-path: '**/go.sum'
      - run: go mod download
      - name: Vet
        run: dev/ci/presubmits/vet
      - name: Build
        run: dev/ci/presubmits/build
      - name: Test
        # Provider-gated tests (anthropic-vertex) skip cleanly in CI
        # without GCP creds — see models/anthropic/vertex_test.go.
        run: dev/ci/presubmits/test-unit
      - name: Coverage summary
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14
          if-no-files-found: error

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          # setup-go@v5 owns the Go module + build caches.
          cache-dependency-path: '**/go.sum'
      # No actions/cache step for ~/.cache/golangci-lint:
      # cached analyzer results were producing CI findings that a
      # fresh local run (same v2.12.1, same config) couldn't
      # reproduce — likely because the cached entries were computed
      # by a previous run whose bundled staticcheck version differed
      # from the one a fresh `go install` resolves. Lint runs ~45s
      # without the cache; deterministic results are worth more than
      # the savings.
      - name: Format
        run: dev/ci/presubmits/verify-go-format
      - name: golangci-lint
        run: dev/ci/presubmits/lint-go

  tidy:
    name: go mod tidy is clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Verify tidy
        run: dev/ci/presubmits/verify-mod-tidy

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Vuln scan
        run: dev/ci/presubmits/verify-vuln

  # `version fallback` moved to its own workflow
  # (.github/workflows/version-fallback.yml) so it runs on
  # markdown-only PRs too — this workflow's `paths-ignore` skips
  # docs, but the check is required by branch protection. Skipped
  # runs would block docs PRs from merging indefinitely.
