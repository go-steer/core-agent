name: Docs lint

# Runs unconditionally on every PR — including docs-only PRs and
# code-only PRs. Same reasoning as version-fallback.yml: docs-lint
# guards drift patterns in markdown, so `ci.yml`'s paths-ignore on
# `**/*.md` would skip exactly the case we care about. Splitting it
# out here means the check runs on every merge candidate regardless
# of what changed.
#
# The linter itself lives at `dev/tools/docs-lint`; see that script
# for what it catches. `dev/ci/presubmits/verify-docs-lint` is the
# CI-facing shim so branch protection sees a stable job name and
# `dev/tools/ci` runs the same script locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify docs freshness
        run: dev/ci/presubmits/verify-docs-lint
