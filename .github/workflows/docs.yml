name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'scripts/verify-*.py'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/site/**'
      - 'scripts/verify-*.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Cancel superseded runs so we don't deploy a stale build over a fresh one.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# GitHub Pages deployment needs `pages: write` + `id-token: write`.
# `contents: read` is enough to checkout.
permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Astro 7 requires Node >=22.12. Bumped from 20 during PR #318.
  NODE_VERSION: '22'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: docs/site/package-lock.json

      - id: pages
        uses: actions/configure-pages@v5
        # Runs only on main push (deploy path) — PRs skip it since there's
        # no Pages env to configure against.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

      - name: Install
        working-directory: docs/site
        run: npm ci

      - name: Build
        working-directory: docs/site
        run: npm run build

      # --- Verification passes -------------------------------------------

      - name: Verify redirect stubs
        run: python3 scripts/verify-redirects.py

      - name: Verify internal links
        run: python3 scripts/verify-internal-links.py

      # --- Upload for deploy (main only) --------------------------------

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          path: docs/site/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    # Deploy on main pushes and manual runs only — PRs verify but don't ship.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
