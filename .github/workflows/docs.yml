name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Cancel superseded runs so we don't deploy a stale build over a fresh one.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# GitHub Pages deployment needs `pages: write` + `id-token: write`.
# `contents: read` is enough to checkout.
permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: docs/site/package-lock.json

      - id: pages
        uses: actions/configure-pages@v5

      - name: Install
        working-directory: docs/site
        run: npm ci

      - name: Build
        working-directory: docs/site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
