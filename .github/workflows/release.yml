name: Release

# Cuts the GitHub Release on every `v*.*.*` tag push:
#   - cross-compiles core-agent + core-agent-tui binaries
#     (linux/darwin × amd64/arm64) via GoReleaser
#   - signs the SHA-256 checksum file via Sigstore keyless
#   - publishes the Release with notes drawn from CHANGELOG.md plus a
#     static install/verify footer (dev/release/install-verify-footer.md.tmpl)
#
# Container images are built by the parallel release-images.yml on
# the same tag push — the two workflows are independent. By the time
# anyone reads the Release notes, both have completed.
#
# Manual republish (e.g. for a tag pushed before this workflow
# existed): `gh workflow run release.yml --ref vX.Y.Z`.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (vX.Y.Z) — required when dispatching from a non-tag ref (e.g. a feature branch for dry-run). Optional when dispatching with --ref vX.Y.Z.'
        required: false
      dry_run:
        description: 'Cross-compile only; skip Sigstore signing and GitHub Release publish. Uploads dist/ as a workflow artifact for inspection. Use to smoke-test the workflow from a feature branch.'
        type: boolean
        default: false

permissions:
  contents: write   # create / update the GitHub Release
  id-token: write   # cosign keyless OIDC

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs full history for changelog detection
          # and accurate {{.Date}} / {{.FullCommit}} resolution.
          fetch-depth: 0
          # Retroactive-tag mode: when dispatched with a `tag` input
          # (e.g., `gh workflow run release.yml --ref main -f tag=v2.4.5`),
          # check out the tagged commit rather than the ref that
          # triggered. main's workflow file drives (GitHub Actions
          # uses the workflow at --ref), but the checkout is the tag
          # so goreleaser sees HEAD == tag commit — otherwise it
          # errors with "git tag vX.Y.Z was not made against
          # commit …". The overlay step below then pulls the release
          # helpers from main so the tag's older infra doesn't run.
          #
          # Contemporary mode (tag push): `inputs.tag` is empty so
          # this falls back to `github.ref` (the tag ref that fired
          # the workflow) — same as the default checkout behavior.
          ref: ${{ inputs.tag || github.ref }}

      # Retroactive-tag mode only: overlay main's release helpers on
      # top of the tag checkout so tags cut before those helpers
      # existed can still be republished cleanly.
      #
      # Motivation: `dev/release/compose-release-notes.sh` (with the
      # pre-release `[Unreleased]` fallback) landed in PR #267; tags
      # cut before that commit (e.g., v2.7.0-dev.[123]) don't have
      # the helper and their inline notes-composer hard-fails on
      # missing `## [X.Y.Z-dev.N]` sections. Overlaying the helper +
      # current CHANGELOG lets the current logic drive the republish.
      #
      # `--skip=validate` on the GoReleaser step below tolerates the
      # working-tree drift this introduces — endorsed by goreleaser
      # docs for exactly this "reproduce release from a different
      # tree" scenario. HEAD still points at the tag commit, so the
      # binary's -X version stamp is correct.
      - name: Overlay release helpers from main (retroactive-tag mode)
        if: ${{ inputs.tag != '' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          git checkout origin/main -- dev/release/ .goreleaser.yml CHANGELOG.md

      # Same go-version-from-go.mod pattern as release-images.yml.
      - name: Extract Go version from go.mod
        id: go-version
        run: |
          version=$(awk '/^go / { print $2; exit }' go.mod)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}

      # Pricing freshness guard: refuse to release if the tagged
      # commit's internal/pricing/builtin.go doesn't match what
      # dev/regen-builtin-pricing would produce today. Motivation:
      # #259 — hand-authored rates drifted 20-30x silently before the
      # regen path landed. The weekly bot/pricing-regen workflow keeps
      # main current; this guard makes sure a stale release can't slip
      # out between weekly runs.
      #
      # Skipped on dry-run so operators can smoke-test the release
      # pipeline from a feature branch without keeping pricing fresh.
      # Also skipped in retroactive-tag mode: historical tags carry
      # historical pricing on purpose, and pre-#259 tags don't even
      # have the regen tool to invoke.
      - name: Guard — pricing catalog fresh
        if: ${{ !inputs.dry_run && inputs.tag == '' }}
        run: |
          set -euo pipefail
          go run ./dev/regen-builtin-pricing
          if ! git diff --quiet internal/pricing/builtin.go; then
            echo "::error::internal/pricing/builtin.go is stale vs LiteLLM's current catalog."
            echo ""
            echo "Remediation:"
            echo "  1. Merge the open auto-PR from bot/pricing-regen (if any), OR"
            echo "  2. Run \`go run ./dev/regen-builtin-pricing\` locally, commit, push."
            echo "  3. Retag and re-push the tag."
            echo ""
            echo "Diff:"
            git --no-pager diff internal/pricing/builtin.go
            exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Resolve the effective tag and build RELEASE_NOTES.md.
      #
      # Stable tags (vX.Y.Z) carve the matching `## [X.Y.Z]` section
      # out of CHANGELOG.md; missing section is a hard-fail.
      #
      # Pre-release tags (vX.Y.Z-dev.N / -rc.N / -alpha.N / -beta.N)
      # fall through cleanly: dev tags are cut frequently and shouldn't
      # each require a per-tag CHANGELOG edit. The helper uses the
      # [Unreleased] section as the narrative and auto-appends a PR
      # list synthesized from `git log vLAST_STABLE..vTAG`.
      #
      # Both paths append the static install/verify footer template.
      # See dev/release/compose-release-notes.sh for the details;
      # the same helper can be invoked locally as a dry-run.
      - name: Compose release notes
        id: notes
        run: |
          set -euo pipefail

          # Resolve tag: push event → GITHUB_REF_NAME; manual dispatch
          # → inputs.tag if provided, else GITHUB_REF_NAME (operator
          # should --ref vX.Y.Z when republishing).
          TAG="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::expected vX.Y.Z or vX.Y.Z-<pre>, got: ${TAG}"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Write to $RUNNER_TEMP rather than the working tree so
          # GoReleaser's dirty-tree check doesn't fire on an
          # untracked file. Matters for retroactive tags where the
          # tagged commit predates the /RELEASE_NOTES.md .gitignore
          # entry — a file in $RUNNER_TEMP is never inside the repo.
          NOTES="${RUNNER_TEMP}/RELEASE_NOTES.md"
          echo "notes_path=${NOTES}" >> "$GITHUB_OUTPUT"

          # Stable path: try the tag's CHANGELOG first, then fall
          # back to origin/main's when the tag predates the entry
          # (retroactive-tagging support). The helper only hard-fails
          # for stable tags, so pre-release invocations skip the
          # fallback dance entirely.
          if ./dev/release/compose-release-notes.sh "$TAG" "$NOTES" CHANGELOG.md; then
            exit 0
          fi

          echo "no [${VERSION}] section in tag's CHANGELOG.md; falling back to origin/main"
          # fetch-depth: 0 above pulled all history but not necessarily
          # the remote refs by name; fetch main explicitly. --no-tags
          # avoids re-touching our tag refs.
          git fetch --no-tags origin main
          MAIN_CHANGELOG="${RUNNER_TEMP}/CHANGELOG.main.md"
          git show origin/main:CHANGELOG.md > "$MAIN_CHANGELOG"
          ./dev/release/compose-release-notes.sh "$TAG" "$NOTES" "$MAIN_CHANGELOG"

      # dry_run → --snapshot (no publish, no sign, fabricated version).
      # Normal tag push → publish + sign with our composed release notes.
      # Retroactive-tag republish → same, plus --skip=validate so goreleaser
      # tolerates the working-tree drift from the overlay step above.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >-
            ${{ inputs.dry_run
                && 'release --snapshot --clean --skip=sign'
                || (inputs.tag != ''
                    && format('release --clean --skip=validate --release-notes={0}', steps.notes.outputs.notes_path)
                    || format('release --clean --release-notes={0}', steps.notes.outputs.notes_path)) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Retro-tag republish only: --skip=validate short-circuits
          # goreleaser's git-tag/HEAD check too, so tell it the tag
          # explicitly. In contemporary tag-push mode this is empty
          # and goreleaser resolves the tag from HEAD as usual.
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}

      # On dry-run, surface the built artifacts so they can be
      # downloaded + inspected without a Release ever being created.
      - name: Upload dry-run artifacts
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: dist-dry-run-${{ steps.notes.outputs.tag }}
          path: dist/
          retention-days: 7
