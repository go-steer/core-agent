# KSA bound to a Google Service Account via Workload Identity Federation.
# The KSA name (core-agent) AND the namespace (agent-system) appear in the
# WIF member binding (see README); change one without the other and the
# IAM policy stops resolving.
#
# The iam.gke.io/gcp-service-account annotation tells the GKE metadata
# server "when this pod's KSA requests ADC, return tokens for THIS GSA".
# Without it, ADC inside the pod resolves to the cluster's default
# Compute Engine SA (much broader privileges than we want).
#
# REQUIRED OUT-OF-BAND SETUP (gcloud commands in README):
#   1. Create GSA: core-agent@<PROJECT>.iam.gserviceaccount.com
#   2. Grant GSA roles: aiplatform.user + container.viewer
#   3. Bind KSA→GSA via iam.workloadIdentityUser role on the GSA
#   4. Replace PROJECT_ID below with your real GCP project ID
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-agent
  namespace: agent-system
  annotations:
    iam.gke.io/gcp-service-account: core-agent@PROJECT_ID.iam.gserviceaccount.com
