# Mounts the .agents/ contents (config.json, mcp.json, AGENTS.md)
# into the pod at /opt/data/.agents/. The agent walks up from its
# cwd (/workspace) and finds /opt/data/.agents/ via the loader's
# .agents/ search path (PR #107).
#
# Editing this ConfigMap:
#   kubectl edit configmap core-agent-config -n agent-system
# Then trigger a reload (no pod restart needed):
#   curl -X POST http://<lb-ip>:7777/sessions/default/reload \
#     -H "Authorization: Bearer $(kubectl get secret -n agent-system \
#       core-agent -o jsonpath='{.data.attach-token}' | base64 -d)"
# Or use /reload from the TUI.
#
# Replace ${GOOGLE_CLOUD_PROJECT} and ${GOOGLE_CLOUD_LOCATION} below
# with your real project + region (the deployment passes these as
# env vars too, but the config.json is read as a literal string —
# substitute at apply time via `envsubst` or kustomize replacements,
# or just hardcode them here for a single-cluster deployment).
apiVersion: v1
kind: ConfigMap
metadata:
  name: core-agent-config
  namespace: agent-system
data:
  config.json: |
    {
      "version": 1,
      "model": {
        "provider": "vertex",
        "name": "gemini-3.1-pro-preview-customtools",
        "vertex": {
          "project": "PROJECT_ID",
          "location": "us-central1"
        }
      },
      "permissions": {
        "mode": "ask",
        "allow": [
          "read_file",
          "read_many_files",
          "stat",
          "list_dir",
          "glob",
          "grep",
          "json_query",
          "fetch_url",
          "todo"
        ]
      },
      "agent": {
        "display_name": "core-agent (GKE)"
      }
    }

  mcp.json: |
    {
      "version": 1,
      "servers": {
        "gke": {
          "transport": "http",
          "url": "https://container.googleapis.com/mcp/read-only",
          "auth": {
            "google_oauth": {
              "scopes": [
                "https://www.googleapis.com/auth/container.read-only"
              ]
            }
          }
        }
      }
    }

  AGENTS.md: |
    # GKE-deployed core-agent

    You are a long-running core-agent instance deployed as a pod in
    a GKE cluster. Operators reach you over an internal HTTP
    LoadBalancer; you have read-only access to the cluster via the
    GKE MCP server.

    ## What you can do

    - Inspect this cluster (GKE MCP read tools): get_k8s_resource,
      describe_k8s_resource, list_k8s_api_resources, get_k8s_logs,
      list_k8s_events.
    - Read files in /workspace and /opt/data/.agents/.
    - Spawn background subagents for fan-out investigation.

    ## What you CANNOT do

    - Mutate any cluster state — your GSA has container.viewer only.
    - Reach other GCP services beyond Vertex AI (inference) and GKE.
    - Be reached from outside the VPC.

    ## Operational notes

    - Session DB persists at /opt/data/sessions.db (10Gi PVC).
    - Plans (if plan-first enabled) land at /opt/data/.agents/plans/.
    - Config reload: /reload slash after editing the ConfigMap.

    See the recipe README for the full operator workflow.
