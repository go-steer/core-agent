# KSA for the core-agent pod. NO iam.gke.io/gcp-service-account
# annotation — this recipe uses Workload Identity Federation for
# GKE *direct binding*, not the legacy GSA-impersonation pattern.
#
# How direct binding works:
#   - The KSA exists only in K8s (this resource).
#   - IAM roles are granted to the KSA's principal identifier
#     directly (no Google Service Account in the middle):
#       principal://iam.googleapis.com/projects/<PROJECT_NUMBER>/
#         locations/global/workloadIdentityPools/<PROJECT_ID>.svc.id.goog/
#         subject/ns/agent-system/sa/core-agent
#   - The GKE metadata server, on a Pod that mounts this KSA's
#     projected token, exchanges the K8s SA token for a short-lived
#     Google access token bearing the roles bound to that principal.
#   - ADC inside the pod uses that exchanged token automatically.
#
# The annotation IS still required for the legacy GSA-impersonation
# alternative; we don't use that here. See README for the exact
# `gcloud projects add-iam-policy-binding --member=principal://...`
# commands.
#
# When you DO need the legacy GSA-impersonation pattern: if your
# target API isn't on the WIF-for-GKE supported-services list, or
# you hit a documented limitation. For Vertex AI + GKE
# (container.googleapis.com) — what this recipe uses — direct
# binding works.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-agent
  namespace: agent-system
  labels:
    app.kubernetes.io/name: core-agent
