# The core-agent pod. Headless (--no-repl) + remote-attach
# (--attach-listen=:7777) so operators connect via core-agent-tui
# from inside the VPC.
#
# Key annotations / fields:
# - apphub.cloud.google.com/functional-type: "AGENT" — registers
#   the workload with Google Cloud Agent Registry on apply.
# - a2a-protocol.org/agent-card — tells Agent Registry where to
#   fetch the A2A AgentCard. core-agent serves it from the attach
#   listener at /.well-known/agent-card.json; Registry uses it to
#   index this agent's name, description, and skills for fleet-
#   wide search. See docs/agent-card-design.md.
# - iam.gke.io/identity-type + iam.gke.io/identity — opts the pod
#   into GKE Managed Workload Identity, which layers SPIFFE x509
#   SVID issuance on top of WIF for GKE. Certs land at
#   /var/run/secrets/workload-spiffe-credentials/ via the
#   mwlid-certificate CSI volume below. (Future: migrate to
#   Google Cloud Agent Identity when GA.)
# - serviceAccountName: core-agent — links to the KSA. With WIF
#   for GKE direct binding (no annotation on the KSA), the GKE
#   metadata server inside the pod exchanges the projected K8s SA
#   token for a Google access token bearing the IAM roles bound
#   to the KSA's principal://... identifier. ADC inside the
#   container picks up the exchanged token automatically.
# - securityContext.fsGroup: 65532 — distroless/static-debian12:nonroot
#   runs as UID 65532; matching fsGroup lets the pod write to the PVC.
# - Single replica with strategy: Recreate — session DB is on a
#   ReadWriteOnce PVC; a rolling deployment would block on PVC
#   detach. For HA you'd switch to ReadWriteMany storage + multi-
#   session daemon (task #12, v2.4).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-agent
  namespace: agent-system
  labels:
    app: core-agent
    app.kubernetes.io/name: core-agent
    app.kubernetes.io/version: "main"
  annotations:
    # Identifies this workload as an AI agent to Google Cloud's
    # Agent Registry — applying this Deployment registers it.
    # Requires the agentregistry.googleapis.com API enabled on
    # the project. See README's prereqs section.
    apphub.cloud.google.com/functional-type: "AGENT"

    # Tells Agent Registry where to fetch the A2A AgentCard for
    # this agent. core-agent serves the card from the attach
    # listener (port 7777) at /.well-known/agent-card.json when
    # `agent.description` is set in config.json. Registry uses
    # the card to index this agent's name, description, and
    # skills for fleet-wide search. See docs/agent-card-design.md.
    a2a-protocol.org/agent-card: |
      card:
        endpoint: "/.well-known/agent-card.json"
        protocol: "HTTP"
        port: "7777"

    # Opts the pod into GKE Managed Workload Identity (in addition
    # to WIF for GKE direct binding for IAM). The control plane
    # provisions a SPIFFE x509 SVID for this workload, mounted at
    # /var/run/secrets/workload-spiffe-credentials/ via the
    # mwlid-certificate CSI volume below. Useful for mTLS between
    # agents (and, in future, for Google Cloud Agent Identity).
    # The `org-<NUMBER>` segment of the trust domain is
    # org-specific — replace with your GKE Managed WI agent
    # identity pool's identifier. Docs:
    # https://docs.cloud.google.com/iam/docs/create-managed-workload-identities-gke
    iam.gke.io/identity-type: agent-identity
    iam.gke.io/identity: "spiffe://agents.global.org-209193599320.system.id.goog/*"

spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) because session DB is on a
    # ReadWriteOnce PVC — only one pod can mount it at a time.
    type: Recreate
  selector:
    matchLabels:
      app: core-agent
  template:
    metadata:
      labels:
        app: core-agent
    spec:
      serviceAccountName: core-agent

      securityContext:
        # Match the distroless image's nonroot user (UID 65532) so
        # the PVC mount is writable. Without fsGroup, the agent
        # gets EPERM when creating /opt/data/sessions.db on first
        # boot.
        fsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: core-agent
          # Pinned to a main-build digest until the next release tag
          # ships. The v2.3.1 image predates the agent-card endpoint
          # (cef0d1b), so the discovery wiring on this Deployment
          # (a2a-protocol.org/agent-card annotation + agent.description
          # in config.json) would be no-op against :2.3.1 — the
          # /.well-known/agent-card.json route wouldn't register and
          # would 404. This digest is from main HEAD with the endpoint
          # in place. Sweep this + every other recipe back to a
          # semver tag (:2.4.0 or whatever ships) once the next
          # release is cut. Multi-arch (amd64 + arm64) so node-pool
          # architecture is automatic. Verify with
          # `cosign verify ghcr.io/go-steer/core-agent@sha256:...`.
          image: ghcr.io/go-steer/core-agent@sha256:4a0da4d9a36dc6918b851fa48461520b474e4faefdaf16d2135a34bb60c5d7dd
          imagePullPolicy: IfNotPresent

          args:
            - --no-repl
            - --attach-listen=:7777
            # --attach-token VALUE is the env var NAME holding the
            # bearer token, not the token itself — keeps the secret
            # off the command line and out of `ps`/`kubectl describe`.
            - --attach-token=ATTACH_TOKEN
            # --session-db is a BOOL toggle (enables the SQLite-
            # backed session + eventlog store); --session-db-path
            # sets the file path. Without --session-db, sessions
            # are in-memory only and lost on pod restart, which
            # defeats the PVC's purpose.
            - --session-db
            - --session-db-path=/opt/data/sessions.db
            # Cost-efficiency: agentic tool wrappers route bulk
            # tool work (file reads, greps, fetches) through a
            # cheaper small model in a subtask, so only the digest
            # enters the parent's context. For a long-running GKE
            # agent doing dense MCP read tools this is real savings
            # ($x cheaper per turn vs running everything through
            # Pro). Default small model: gemini-2.5-flash on Vertex.
            # Override via the AGENTIC_SMALL_MODEL env var (e.g., a
            # different Flash variant; or "" to disable routing and
            # let subtasks inherit the parent model).
            - --agentic-tools
            - --agentic-small-model=$(AGENTIC_SMALL_MODEL)
            - -c=/opt/data/.agents/config.json
            # The agent-card's public-facing description comes
            # from config.json's `agent.description` field
            # (single-sourced with the LLM's WithDescription). Add
            # --agent-card-description=... here only if the card's
            # wording needs to differ from the LLM's identity.

          ports:
            - name: attach
              containerPort: 7777
              protocol: TCP

          env:
            # The agent's Vertex AI client reads these to know which
            # project + region to call. Auth itself flows through
            # ADC → GKE metadata server → token exchange → IAM
            # roles bound to the KSA principal; these env vars only
            # tell the client WHERE, not WHO.
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID"
            - name: GOOGLE_CLOUD_LOCATION
              value: "REGION"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "1"

            # Default agentic-small-model. Operators override via
            # the overlay's patch-deployment.yaml (env var by name,
            # strategic merge — same pattern as the project/location
            # vars). Set to "" to disable agentic routing entirely
            # (subtasks then run on the parent's model).
            - name: AGENTIC_SMALL_MODEL
              value: "gemini-2.5-flash"

            # Bearer token for /attach-listen auth, sourced from
            # the Secret (never appears in pod spec or ConfigMap).
            - name: ATTACH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: core-agent
                  key: attach-token

          # Resource requests sized for Gemini Pro on Vertex with
          # light-to-moderate tool use. Bump CPU if you see the
          # agent's response-stream throttled; bump memory if you
          # enable plan-first + retain plans across long sessions
          # (each plan file is small but accumulates).
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

          volumeMounts:
            - name: agent-data
              mountPath: /opt/data
            - name: agent-config
              mountPath: /opt/data/.agents
              readOnly: true
            # SPIFFE x509 SVID + trust bundle from GKE Managed
            # Workload Identity (issued because of the
            # iam.gke.io/identity* annotations above). Files are
            # auto-rotated by the GKE control plane. Consumers
            # needing mTLS to other agents (or the future Google
            # Cloud Agent Identity mesh) read these directly.
            - name: mwlid-certificate
              mountPath: /var/run/secrets/workload-spiffe-credentials
              readOnly: true
          # Liveness + readiness: TCP probe against the attach
          # listener. Every endpoint under /sessions requires the
          # bearer token, so an HTTP probe without it would 401 and
          # mark the pod unhealthy. TCP is sufficient: if the
          # listener is accepting connections, the agent is up.
          # Operators with stricter health requirements can wire a
          # sidecar that does an authed HTTP probe and exposes a
          # simple /healthz; for the default recipe TCP is the
          # right trade-off.
          livenessProbe:
            tcpSocket:
              port: attach
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: attach
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: core-agent-data
        - name: agent-config
          configMap:
            name: core-agent-config
        # GKE Managed Workload Identity SPIFFE cert source. The
        # podcertificate.gke.io CSI driver materializes a
        # short-lived, auto-rotated x509 SVID + trust bundle for
        # this pod via the spiffe.gke.io/svid signer. Requires
        # GKE Managed WI to be enabled on the cluster.
        - name: mwlid-certificate
          csi:
            driver: podcertificate.gke.io
            volumeAttributes:
              signerName: spiffe.gke.io/svid
