# KSA for the core-agent daemon pod. Uses Workload Identity
# Federation for GKE *direct binding* — no Google Service Account
# impersonation for the KSA itself. Bind the following IAM roles to
# this KSA's principal in your project:
#
#   principal://iam.googleapis.com/projects/<PROJECT_NUMBER>/locations/global/
#     workloadIdentityPools/<PROJECT_ID>.svc.id.goog/subject/
#     ns/agent-triage/sa/core-agent-daemon
#
# Required roles for the triage use case:
#   - roles/aiplatform.user       — call Gemini via Vertex AI
#   - roles/mcp.toolUser          — call any GKE MCP tool at all
#   - roles/container.admin       — administer GKE clusters + workloads
#                                    via the MCP (the full-access /mcp
#                                    endpoint exercises admin ops for
#                                    some triage fixes)
#   - roles/iam.serviceAccountUser on the node service account
#                                   (default: <PROJECT_NUMBER>-compute@
#                                    developer.gserviceaccount.com) —
#                                    required by the GKE MCP's server-
#                                    side impersonation chain; missing
#                                    this gives 403 with no clear hint
#
# Required API: iamcredentials.googleapis.com must be enabled for the
# WIF token-exchange path to work; without it ADC returns "permission
# denied" at first runtime call.
#
# Automated setup: `scripts/setup-wif.sh` at the recipe root enables
# the APIs + binds all four roles idempotently. See the recipe README
# for details + the manual gcloud commands.
#
# Scope carefully — this SA can administer the cluster. For prod,
# consider restricting via project-scoped bindings or per-namespace
# permissions instead of `roles/container.admin`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-agent-daemon
  namespace: agent-triage
