# KSA for the core-agent daemon pod. Uses Workload Identity
# Federation for GKE direct binding — bind the following IAM roles
# to this KSA's principal in your project (the recipe README has the
# exact gcloud commands):
#
#   principal://iam.googleapis.com/projects/<PROJECT_NUMBER>/locations/global/
#     workloadIdentityPools/<PROJECT_ID>.svc.id.goog/subject/
#     ns/agent-triage/sa/core-agent-daemon
#
# Required roles for the triage use case:
#   - roles/aiplatform.user        (Vertex AI inference)
#   - roles/container.viewer       (read-only Kubernetes Engine API access)
#   - roles/container.developer    (workload mutation via GKE MCP)
#   - roles/logging.viewer         (fetch Cloud Logging entries)
#   - roles/monitoring.viewer      (fetch metrics)
#
# Scope carefully — this SA can mutate workloads across the cluster.
# In production, restrict via RBAC (ClusterRole for triage, not full
# cluster-admin). See the recipe README for the recommended
# least-privilege ClusterRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-agent-daemon
  namespace: agent-triage
