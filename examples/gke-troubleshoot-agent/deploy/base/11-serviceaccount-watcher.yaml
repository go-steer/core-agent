# KSA for the k8s-event-watcher sidecar. Minimum-necessary RBAC —
# see 12-clusterrole-watcher.yaml. NOT bound to any GCP IAM role;
# the sidecar only talks to the local k8s API and to the core-agent
# daemon over pod networking.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-event-watcher
  namespace: agent-triage
