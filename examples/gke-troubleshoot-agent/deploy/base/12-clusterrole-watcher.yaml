# Minimum-necessary ClusterRole for the k8s-event-watcher sidecar.
# The sidecar only OBSERVES cluster state — never modifies it. All
# mutations happen through the core-agent daemon's MCP tool calls,
# authorized by the daemon's own ServiceAccount.
#
# What the sidecar needs:
#   - list/watch events — the primary informer target
#   - get pods       — status enrichment for inject payloads (owner
#                       ref, container statuses); design doc §"Sidecar
#                       CLI" mentions this optional GET path
#
# What the sidecar deliberately does NOT get:
#   - patch/update/delete on anything — sidecar is read-only
#   - secrets — sidecar never reads workload secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-event-watcher
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
