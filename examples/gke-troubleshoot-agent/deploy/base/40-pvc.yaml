# Persistent storage for the daemon's session DB (eventlog + ACL rows).
# Session-resume relies on this being persistent across pod restarts.
# 10 GiB is well over-provisioned for most triage deployments — the
# eventlog grows a few KB per turn, so 10 GiB covers years of activity.
#
# StorageClassName omitted → GKE default StorageClass. Override in an
# overlay if you need a specific class (SSD PD, Filestore, etc.).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: core-agent-session-db
  namespace: agent-triage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
