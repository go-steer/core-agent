# The core-agent daemon Deployment. Long-lived, single-replica,
# multi-session-enabled. Accepts inject POSTs from the sidecar (in
# this same cluster) and from any additional sidecars in remote
# clusters that point at this daemon's Service.
#
# The daemon:
#   - Serves /sessions endpoints on port 7777 (attach listener).
#   - Persists eventlog + session ACL to a PVC (RWO; single-replica).
#   - Runs with --no-repl so it's headless — operators attach via
#     `core-agent-tui https://<daemon-service>:7777 --token $TOK`.
#
# For HA (multi-replica), you'd need ReadWriteMany storage. Out of
# scope for the starter recipe.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-agent
  namespace: agent-triage
  labels:
    app.kubernetes.io/name: core-agent
    app.kubernetes.io/component: daemon
  annotations:
    apphub.cloud.google.com/functional-type: "AGENT"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: core-agent
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core-agent
        app.kubernetes.io/component: daemon
    spec:
      serviceAccountName: core-agent-daemon
      # For Standard clusters only — uncomment to pin the pod onto
      # nodes where the GKE metadata server is enabled. Required for
      # Workload Identity Federation to work; without it the pod
      # falls through to instance metadata and Vertex/GKE-MCP calls
      # return "permission denied."
      #
      # Autopilot clusters REJECT this nodeSelector — the metadata
      # server is universally available on Autopilot, so the selector
      # isn't needed. Leaving it commented is the Autopilot-safe
      # default; overlay operators on Standard clusters uncomment it.
      #
      # nodeSelector:
      #   iam.gke.io/gke-metadata-server-enabled: "true"
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      # Stage users.json out of the Secret volume into an emptyDir
      # with user-only mode. Required because pkg/auth/users.go rejects
      # any group/other mode bits, and pod-level fsGroup=65532 unconditionally
      # adds group-read to files in Secret volumes — so a Secret mounted
      # at defaultMode=0400 arrives as 0440 and the daemon aborts at
      # multi-session auth init with:
      #   auth: users file ".../users.json" has mode 0440;
      #        must be 0600 or stricter (group/other bits must be unset)
      # See go-steer/core-agent issue TBD (relax check to accept
      # group-read when group == process gid) for the eventual fix.
      initContainers:
        - name: install-users-json
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              cp /secret-src/users.json /shared/users.json
              chmod 0400 /shared/users.json
              # Owner already matches: fsGroup made the target dir
              # group-owned by 65532, so cp inherits that; but we
              # want owner=65532 explicitly. Chown works because
              # this initContainer runs as root.
              chown 65532:65532 /shared/users.json
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: users-src
              mountPath: /secret-src
              readOnly: true
            - name: users
              mountPath: /shared
      containers:
        - name: core-agent
          image: ghcr.io/go-steer/core-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            # -c points at the config file. The daemon derives its
            # agentsDir (where it looks for AGENTS.md / mcp.json /
            # skills/) from filepath.Dir(-c), so config.json MUST live
            # in the same directory as the rest of the .agents/ tree.
            # There is no --agents-dir flag — see cmd/core-agent/main.go
            # loadConfig().
            #
            # attach.listen (0.0.0.0:7777) + session-db config live in
            # config.json; --no-repl requires attach.listen or unix
            # socket to be set (via CLI flag or config overlay).
            #
            # --small-tier-parent=allow suppresses the "gemini-3.5-flash
            # is a small-tier model" warning. Triage sessions here are
            # short + reference-driven; Flash handles them fine and is
            # ~6x cheaper than Pro. Bump to gemini-3.5-pro (config.json
            # model.name) if you see the daemon looping or stalling.
            - "-c"
            - "/etc/core-agent/agents/config.json"
            - "--no-repl"
            - "--session-db"
            - "--session-db-path=/var/lib/core-agent/session.db"
            - "--small-tier-parent=allow"
          envFrom:
            # GCP project + location for the Vertex AI client. The
            # ConfigMap is generated by the base kustomization with
            # defaults (see kustomization.yaml); overlays override via
            # 'behavior: merge' on core-agent-gcp-env.
            #
            # Expected keys: GOOGLE_CLOUD_PROJECT, GOOGLE_CLOUD_LOCATION
            #
            # Without these the daemon exits at Vertex init with:
            #   core-agent: vertex: project and location are required
            #     (set model.vertex.{project,location} in .agents/config.json
            #      or GOOGLE_CLOUD_PROJECT / GOOGLE_CLOUD_LOCATION env vars)
            - configMapRef:
                name: core-agent-gcp-env
          ports:
            - name: attach
              containerPort: 7777
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            # The entire .agents/ tree (config.json + AGENTS.md + mcp.json
            # + skills/) lives in one projected configMap volume at
            # /etc/core-agent/agents. The daemon takes -c pointing into
            # this dir, then discovers everything else relative to it.
            - name: agents
              mountPath: /etc/core-agent/agents
              readOnly: true
            # users.json is a Secret mounted as a subPath file so its
            # parent (/etc/core-agent) stays a normal kubelet-managed
            # dir — the parent isn't itself a mount, so the subPath
            # file mount here doesn't collide with anything.
            - name: users
              mountPath: /etc/core-agent/users.json
              subPath: users.json
              readOnly: true
            - name: session-db
              mountPath: /var/lib/core-agent
          readinessProbe:
            httpGet:
              path: /sessions
              port: attach
              httpHeaders:
                - name: Authorization
                  value: "Bearer probe-token-never-valid"
            # A 401 from the auth surface is proof of life; the probe
            # doesn't need to pass auth. Any HTTP response counts as
            # "the listener is up." Kubelet treats 401 as healthy per
            # the standard http-probe semantics (2xx / 3xx pass; we
            # avoid making the probe carry a real token).
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: attach
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        # The .agents/ tree (config.json + AGENTS.md + mcp.json + skills/)
        # lives in one flat ConfigMap (core-agent-agents); items: maps
        # each key to its subpath. This is why keys use "_" as a path
        # separator in the kustomization — k8s ConfigMap keys can't
        # contain "/", but items:.path can.
        - name: agents
          configMap:
            name: core-agent-agents
            items:
              - key: config.json
                path: config.json
              - key: AGENTS.md
                path: AGENTS.md
              - key: mcp.json
                path: mcp.json
              - key: k8s-triage_SKILL.md
                path: skills/k8s-triage/SKILL.md
              - key: k8s-triage_CrashLoopBackOff.md
                path: skills/k8s-triage/references/CrashLoopBackOff.md
              - key: k8s-triage_ImagePullBackOff.md
                path: skills/k8s-triage/references/ImagePullBackOff.md
              - key: k8s-triage_ErrImagePull.md
                path: skills/k8s-triage/references/ErrImagePull.md
              - key: k8s-triage_OOMKilled.md
                path: skills/k8s-triage/references/OOMKilled.md
              - key: k8s-triage_FailedMount.md
                path: skills/k8s-triage/references/FailedMount.md
              - key: k8s-triage_FailedScheduling.md
                path: skills/k8s-triage/references/FailedScheduling.md
              - key: k8s-triage_BackOff.md
                path: skills/k8s-triage/references/BackOff.md
              - key: k8s-triage_Unhealthy.md
                path: skills/k8s-triage/references/Unhealthy.md
              - key: k8s-triage_NetworkNotReady.md
                path: skills/k8s-triage/references/NetworkNotReady.md
              - key: k8s-triage_NodeNotReady.md
                path: skills/k8s-triage/references/NodeNotReady.md
              - key: k8s-triage_Evicted.md
                path: skills/k8s-triage/references/Evicted.md
              - key: k8s-triage__fallback.md
                path: skills/k8s-triage/references/_fallback.md
        # The Secret volume (users-src) is only mounted by the
        # install-users-json initContainer, which copies users.json into
        # the users emptyDir with owner 65532:65532 mode 0400. The main
        # daemon container mounts the emptyDir — never the Secret
        # directly — because the fsGroup+Secret interaction produces
        # a mode the daemon's auth loader rejects. See the initContainer
        # comment for the full story.
        - name: users-src
          secret:
            secretName: core-agent-users
            defaultMode: 0400
        - name: users
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: session-db
          persistentVolumeClaim:
            claimName: core-agent-session-db
