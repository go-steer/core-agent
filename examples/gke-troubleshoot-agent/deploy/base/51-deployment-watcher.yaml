# The k8s-event-watcher sidecar Deployment. Watches Kubernetes Events
# via the local kube-apiserver, filters + dedupes, and POSTs matched
# events to the core-agent daemon's session inject endpoint.
#
# Runs as a SEPARATE Deployment from the daemon (not a sidecar
# container in the daemon's pod) so:
#   - operators can scale the two independently
#   - a sidecar restart doesn't restart the daemon (and vice-versa)
#   - additional sidecars in remote clusters follow the same shape
#     (this manifest is the template — copy + change --cluster-name +
#     --daemon-url to add coverage of another cluster)
#
# Talks to the local daemon via the core-agent Service on port 7777.
# For remote clusters, override --daemon-url to
# https://<external-daemon-endpoint>:7777.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-event-watcher
  namespace: agent-triage
  labels:
    app.kubernetes.io/name: k8s-event-watcher
    app.kubernetes.io/component: watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-event-watcher
      app.kubernetes.io/component: watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-event-watcher
        app.kubernetes.io/component: watcher
    spec:
      serviceAccountName: k8s-event-watcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: watcher
          image: ghcr.io/go-steer/k8s-event-watcher:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--daemon-url=http://core-agent.agent-triage.svc.cluster.local:7777"
            - "--token-env=WATCHER_TOKEN"
            - "--mode=per-incident"
            - "--owner=sre-oncall@example.com"
            - "--cluster-name=local"
            - "--dedup-window=5m"
            - "--in-cluster"
            - "--metrics-addr=:9090"
            - "--log-level=info"
          env:
            - name: WATCHER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8s-event-watcher-token
                  key: token
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
