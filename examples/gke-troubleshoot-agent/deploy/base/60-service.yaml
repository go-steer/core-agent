# ClusterIP Service for the core-agent daemon. Reachable in-cluster
# as http://core-agent.agent-triage.svc.cluster.local:7777.
#
# For operator attach from outside the cluster, expose this via one
# of: internal HTTP LoadBalancer, IAP, Cloud Workstations, or
# `kubectl port-forward svc/core-agent 7777:7777`. Recipe README
# covers the four paths.
apiVersion: v1
kind: Service
metadata:
  name: core-agent
  namespace: agent-triage
  labels:
    app.kubernetes.io/name: core-agent
    app.kubernetes.io/component: daemon
spec:
  type: ClusterIP
  ports:
    - name: attach
      port: 7777
      targetPort: attach
      protocol: TCP
  selector:
    app.kubernetes.io/name: core-agent
    app.kubernetes.io/component: daemon
