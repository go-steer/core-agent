# .agents/env.yaml — env-var manifest for the k8s troubleshooting recipe.
#
# Declares the three environment variables AGENTS.md interpolates via
# ${env:VAR} references. The daemon validates these at boot: a missing
# required var → fail-loud error, no silent placeholder leakage into
# the system prompt.
#
# Values come from the K8s Deployment's envFrom reference to the
# core-agent-gcp-env ConfigMap (see deploy/base/50-deployment-daemon.yaml).
# Operators fill in the ConfigMap once per cluster; the daemon reads
# from env at startup.
#
# Off-GKE deployments (Docker, systemd, local dev) set the same env
# vars via whatever mechanism the runtime provides — the manifest is
# environment-agnostic.
#
# See docs/concepts/env-manifest.md for the full schema.
version: 1
env:
  - name: GCP_PROJECT
    required: true
    description: GCP project ID the daemon operates in (must match the KSA's WIF binding project)
    used_by: [AGENTS.md]
  - name: GKE_CLUSTER
    required: true
    description: GKE cluster name (matches the "cluster" field in watcher inject payloads)
    used_by: [AGENTS.md]
  - name: GKE_LOCATION
    required: true
    description: GKE cluster location (region or zone, e.g. "us-central1")
    used_by: [AGENTS.md]
