# Base kustomization. Do NOT apply this directly — it uses defaults
# (ghcr.io/go-steer/*:latest, sre-oncall@example.com) you'd want to
# override. Instead, copy deploy/overlays/example/ to your own
# overlay directory, edit the values you care about, and
# `kubectl apply -k` your overlay.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Default namespace for all resources — including those emitted by
# configMapGenerator/secretGenerator. Individual resource YAMLs
# already hardcode this, but generated ConfigMaps have no such
# hardcoded namespace; WITHOUT this line they'd land in whatever
# namespace kubectl defaults to (usually `default`) and the daemon
# pod would sit in FailedMount indefinitely. Cluster-scoped
# resources (ClusterRole, ClusterRoleBinding) ignore this field.
namespace: agent-triage

resources:
  - 00-namespace.yaml
  - 10-serviceaccount-daemon.yaml
  - 11-serviceaccount-watcher.yaml
  - 12-clusterrole-watcher.yaml
  - 13-clusterrolebinding-watcher.yaml
  - 40-pvc.yaml
  - 50-deployment-daemon.yaml
  - 51-deployment-watcher.yaml
  - 60-service.yaml
  # Secrets (core-agent-users, k8s-event-watcher-token) are NOT in the
  # kustomization — they're created out-of-band per the instructions
  # in 20-secrets-placeholder.md.

# ConfigMap for the .agents/ tree — a single flat ConfigMap holds
# every file the daemon needs (config.json + AGENTS.md + mcp.json +
# skills/**). The Deployment's projected volume (see
# 50-deployment-daemon.yaml) maps each key to its correct subpath.
#
# The daemon uses -c=<config.json> to bootstrap and derives its
# agentsDir from filepath.Dir(that arg), so config.json MUST be a
# sibling of AGENTS.md / mcp.json / skills/ (same projected volume,
# same directory). See cmd/core-agent/main.go loadConfig() and the
# recipe README's "why one configMap" note.
#
# k8s ConfigMap keys can't contain "/", so we flatten file paths
# into safe key names here and reconstitute the tree in the
# projected volume's items: list.
configMapGenerator:
  # GCP project + location the daemon uses when initializing the
  # Vertex client. Consumed via envFrom on the daemon container (see
  # 50-deployment-daemon.yaml). Defaults work out-of-the-box for the
  # go-steer demo project; every other operator overrides these via
  # 'behavior: merge' in their overlay:
  #
  #   configMapGenerator:
  #     - name: core-agent-gcp-env
  #       behavior: merge
  #       literals:
  #         - GOOGLE_CLOUD_PROJECT=my-real-project
  #         - GOOGLE_CLOUD_LOCATION=us-central1
  - name: core-agent-gcp-env
    literals:
      - GOOGLE_CLOUD_PROJECT=gke-demos-345619
      - GOOGLE_CLOUD_LOCATION=global

  - name: core-agent-agents
    files:
      - config.json=config/config.json
      - AGENTS.md=config/AGENTS.md
      - mcp.json=config/mcp.json
      - k8s-triage_SKILL.md=config/skills/k8s-triage/SKILL.md
      - k8s-triage_CrashLoopBackOff.md=config/skills/k8s-triage/references/CrashLoopBackOff.md
      - k8s-triage_ImagePullBackOff.md=config/skills/k8s-triage/references/ImagePullBackOff.md
      - k8s-triage_ErrImagePull.md=config/skills/k8s-triage/references/ErrImagePull.md
      - k8s-triage_OOMKilled.md=config/skills/k8s-triage/references/OOMKilled.md
      - k8s-triage_FailedMount.md=config/skills/k8s-triage/references/FailedMount.md
      - k8s-triage_FailedScheduling.md=config/skills/k8s-triage/references/FailedScheduling.md
      - k8s-triage_BackOff.md=config/skills/k8s-triage/references/BackOff.md
      - k8s-triage_Unhealthy.md=config/skills/k8s-triage/references/Unhealthy.md
      - k8s-triage_NetworkNotReady.md=config/skills/k8s-triage/references/NetworkNotReady.md
      - k8s-triage_NodeNotReady.md=config/skills/k8s-triage/references/NodeNotReady.md
      - k8s-triage_Evicted.md=config/skills/k8s-triage/references/Evicted.md
      - k8s-triage__fallback.md=config/skills/k8s-triage/references/_fallback.md

# Disable the auto-appended content hash on the generated ConfigMaps
# so overlays can reference them by stable name without knowing the
# hash. Overlays that customize the ConfigMap content will pick up
# the new content on `kubectl apply -k` even without the hash
# because we `rollout restart` the Deployment in the recipe README.
generatorOptions:
  disableNameSuffixHash: true
