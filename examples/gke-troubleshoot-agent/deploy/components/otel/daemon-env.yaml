# Strategic-merge patch: adds the two env vars that operators
# universally need but that GKE Managed OTel's Instrumentation CR
# does NOT auto-inject. Everything else (endpoint, exporter selection,
# resource attributes with k8s.pod.uid, sampler config, metric interval)
# rides the standard OTel SDK env vars the CR does inject on GKE, or
# gets set operator-side off-GKE.
#
#   - OTEL_TRACES_EXPORTER=otlp — load-bearing since PR #315: overrides
#     cfg.OTEL.Exporter (default "none") without patching config.json.
#     Redundant on GKE (the CR also injects it) but harmless there, and
#     required off-GKE where nothing else flips the exporter on.
#
#   - OTEL_SERVICE_NAME=core-agent — GKE Managed OTel's
#     Instrumentation CR explicitly does NOT inject this (verified
#     against the docs + a live cluster; see
#     https://docs.cloud.google.com/kubernetes-engine/docs/concepts/managed-otel-gke#environment_variables).
#     Without it, our daemon's spans show up in Cloud Trace with a
#     synthesized "unknown_service:core-agent" tag. Setting it on the
#     Deployment guarantees a stable service.name across GKE + off-GKE.
#
# Container-list merge is by name, so we target `core-agent`
# specifically without disturbing the base's envFrom / args /
# volumeMounts / etc.
#
# GOOGLE_CLOUD_PROJECT (needed for the gcp.project_id resource attr
# Cloud Trace requires) is already wired via the base's envFrom
# reference to the core-agent-gcp-env ConfigMap — no need to
# duplicate it here. pkg/telemetry.Setup reads it and passes to ADK
# via WithGcpResourceProject.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-agent
spec:
  template:
    spec:
      containers:
        - name: core-agent
          env:
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_SERVICE_NAME
              value: "core-agent"
