# Strategic-merge patch: adds the ONE non-standard env var that
# `pkg/telemetry` needs to actually register an exporter — everything
# else (endpoint, service name, resource attributes, sampling) is
# spec-standard and honored by ADK's underlying OpenTelemetry SDK
# directly, so it's set by whatever provides the runtime environment:
#
#   - On GKE with Managed OpenTelemetry, an `Instrumentation` CR
#     injects OTEL_EXPORTER_OTLP_ENDPOINT / OTEL_SERVICE_NAME /
#     OTEL_RESOURCE_ATTRIBUTES / sampler ratio / metric interval into
#     matching Pods automatically. See overlays/example-otel/ for a
#     working shape.
#
#   - Off GKE (self-managed Collector, Docker Compose, systemd, etc.)
#     the operator sets those env vars themselves — either via their
#     own overlay's env patch (see this component's README § "Non-GKE")
#     or via whatever env-injection mechanism their runtime provides.
#
# Container-list merge is by name, so we target `core-agent`
# specifically without disturbing the base's envFrom / args /
# volumeMounts / etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-agent
spec:
  template:
    spec:
      containers:
        - name: core-agent
          env:
            # Overrides `otel.exporter` from the base config.json
            # (default: "none"). This is the load-bearing knob PR #315
            # landed for k8s deployments — a shared config.json
            # ConfigMap can't carry per-Pod exporter targets, so the
            # per-Deployment env var wins.
            #
            # Values: "none" | "console" | "otlp".
            #
            # No other env var flips the exporter on — the standard
            # OTel SDK env vars (OTEL_EXPORTER_OTLP_ENDPOINT etc.)
            # only take effect once an exporter is registered.
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
