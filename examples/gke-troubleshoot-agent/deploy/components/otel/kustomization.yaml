# OTel enablement component. Compose into any overlay via:
#
#   components:
#     - ../../components/otel
#
# Sets two env vars on BOTH the daemon and watcher containers that
# GKE Managed OTel's Instrumentation CR does not auto-inject:
#
#   - OTEL_TRACES_EXPORTER=otlp — flips pkg/telemetry.Setup from
#     "no exporter" (config.json default: "none") to OTLP. Load-bearing
#     off-GKE; harmless-redundant on GKE (CR also injects it).
#
#   - OTEL_SERVICE_NAME — set to "core-agent" and "k8s-event-watcher"
#     respectively. GKE Managed OTel's Instrumentation CR explicitly
#     does NOT inject this (verified against
#     https://docs.cloud.google.com/kubernetes-engine/docs/concepts/managed-otel-gke#environment_variables),
#     so spans would otherwise show up as "unknown_service:<binary>".
#
# Everything else — endpoint, resource attributes, sampling — rides
# the standard OTel SDK env vars the CR injects on GKE, or gets set
# operator-side off-GKE (see README.md § "Non-GKE").
#
# GOOGLE_CLOUD_PROJECT (for the gcp.project_id resource attribute
# Cloud Trace requires) is already wired via the base's envFrom on
# the core-agent-gcp-env ConfigMap — pkg/telemetry.Setup reads it
# and passes to ADK via WithGcpResourceProject.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - path: daemon-env.yaml
    target:
      kind: Deployment
      name: core-agent
  - path: watcher-env.yaml
    target:
      kind: Deployment
      name: k8s-event-watcher
