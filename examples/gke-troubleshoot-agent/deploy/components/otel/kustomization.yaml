# OTel enablement component. Compose into any overlay via:
#
#   components:
#     - ../../components/otel
#
# Deliberately narrow scope: this component sets the ONE non-standard
# env var (`OTEL_TRACES_EXPORTER`, from PR #315) needed to switch
# `pkg/telemetry` from "no exporter" to "OTLP exporter." Everything
# else — endpoint, service name, resource attributes, sampling — is
# spec-standard and honored by ADK's underlying OpenTelemetry SDK, so
# it belongs wherever the operator provisions env for their runtime:
#
#   - GKE with Managed OpenTelemetry: an `Instrumentation` custom
#     resource auto-injects the standard OTEL_* env vars. See
#     overlays/example-otel/ for the shipped example.
#
#   - Anywhere else: the operator sets OTEL_EXPORTER_OTLP_ENDPOINT
#     (and any other standard OTel SDK env vars they want) in their
#     own overlay's env patch. See README.md § "Non-GKE" for the
#     recipe.
#
# Both paths compose the same component; only the "where does the
# endpoint come from" step differs.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - path: daemon-env.yaml
    target:
      kind: Deployment
      name: core-agent
