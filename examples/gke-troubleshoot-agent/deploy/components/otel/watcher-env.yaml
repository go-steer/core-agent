# Same shape as daemon-env.yaml but for the watcher. Sets the two
# vars GKE Managed OTel's Instrumentation CR does NOT inject:
# OTEL_TRACES_EXPORTER (flips the exporter on — pkg/telemetry.Setup
# defaults to "none" from cfg.OTEL.Exporter) and OTEL_SERVICE_NAME
# (docs confirm auto-inject skips this).
#
# Without OTEL_SERVICE_NAME the watcher's spans show up in Cloud
# Trace as "unknown_service:k8s-event-watcher"; setting it explicitly
# lets operators filter by service.name=k8s-event-watcher cleanly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-event-watcher
spec:
  template:
    spec:
      containers:
        - name: watcher
          env:
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_SERVICE_NAME
              value: "k8s-event-watcher"
