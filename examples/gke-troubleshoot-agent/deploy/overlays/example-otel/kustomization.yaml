# Example overlay + OpenTelemetry to GKE Managed OTel. Same shape as
# ../example, plus:
#
#   1. components/otel — turns the daemon's exporter on (one env var).
#   2. instrumentation.yaml — the GKE Managed OpenTelemetry CR that
#      auto-injects OTEL_EXPORTER_OTLP_ENDPOINT / OTEL_SERVICE_NAME /
#      OTEL_RESOURCE_ATTRIBUTES into every Pod in the namespace.
#
# Spans land in Cloud Trace with no self-managed collector to run.
# See README.md for GKE cluster prereqs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Compose the plain example overlay as-is (base + watcher cluster
# name patch + agents ConfigMap) so this overlay stays a superset,
# not a fork. Also compose the Instrumentation CR — kustomize
# doesn't have a dedicated CR slot, so it goes in `resources:`
# alongside the composed overlay.
resources:
  - ../example
  - instrumentation.yaml

# The one-env-var component. See components/otel/README.md — the
# endpoint / service / resource attrs come from the CR above, not
# this component.
components:
  - ../../components/otel

# Pin the composed example's images to the v2.7.0 GA — the first
# stable release carrying the OTEL_TRACES_EXPORTER env override
# (PR #315, initially shipped in v2.7.0-dev.4) plus the OTel span-
# duplication and Cloud Trace resource fixes from #333–#340.
# Without this pin, kustomize would fall through to the base
# example overlay's 2.6.0 tag and the daemon would ignore the
# exporter env var.
images:
  - name: ghcr.io/go-steer/core-agent
    newTag: "2.7.0"
  - name: ghcr.io/go-steer/k8s-event-watcher
    newTag: "2.7.0"
