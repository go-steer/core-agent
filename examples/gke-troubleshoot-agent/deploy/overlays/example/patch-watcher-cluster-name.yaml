# Sets the k8s-event-watcher's --cluster-name flag so every inject
# payload identifies which cluster it came from. Essential when one
# daemon serves multiple sidecars in different clusters.
#
# Edit "prod-us-central1" to match your GKE cluster's name (usually
# whatever appears in `gcloud container clusters list`).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-event-watcher
spec:
  template:
    spec:
      containers:
        - name: watcher
          args:
            - "--daemon-url=http://core-agent.agent-triage.svc.cluster.local:7777"
            - "--token-env=WATCHER_TOKEN"
            - "--mode=per-incident"
            - "--owner=sre-oncall@example.com"
            - "--cluster-name=prod-us-central1"
            - "--dedup-window=5m"
            - "--in-cluster"
            - "--metrics-addr=:9090"
            - "--log-level=info"
