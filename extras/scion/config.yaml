harness: core-agent
name: core-agent
image: scion-core-agent:latest
user: scion

provisioner:
  type: container-script
  interface_version: 2
  command: ["python3", "/home/scion/.scion/harness/provision.py"]
  timeout: 30s
  lifecycle_events:
    - pre-start
  required_image_tools:
    - python3

config_dir: .agents
skills_dir: .agents/skills
interrupt_key: C-c
instructions_file: AGENTS.md
system_prompt_file: AGENTS.md
system_prompt_mode: prepend_to_instructions

command:
  base: ["core-agent", "--yolo"]
  # -i "TASK" seeds the first turn then stays in the interactive TUI/REPL.
  # Scion runs the container in tmux (real PTY) so core-agent's bubble-tea
  # TUI auto-launches; `scion message <agent>` via tmux send-keys types
  # into the TUI's input field. Do NOT use -p (headless one-shot) — the
  # process would exit after the first turn.
  task_flag: "-i"
  task_position: after_base_args

env_template:
  SCION_AGENT_NAME: "{{ .AgentName }}"

# Model aliases — map Scion's tiered names to core-agent-supported
# model IDs. Consumers override these in their template if they want
# a different provider (e.g. Anthropic).
model_aliases:
  small: "gemini-2.0-flash"
  medium: "gemini-2.0-flash"
  large: "gemini-2.5-pro"
  extra-large: "gemini-2.5-pro"

mcp:
  global_config_file: .agents/mcp.json
  global_config_path: servers
  transport_field: transport
  transport_map:
    stdio: stdio
    sse: http
    streamable-http: http

capabilities:
  limits:
    max_turns: { support: "no", reason: "core-agent enforces per-turn cost ceilings, not turn counts" }
    max_model_calls: { support: "no" }
    max_duration: { support: "yes" }
  telemetry:
    enabled: { support: "yes" }
    native_emitter: { support: "yes", reason: "OTEL via pkg/telemetry" }
  prompts:
    system_prompt: { support: "yes" }
    agent_instructions: { support: "yes" }
  auth:
    api_key: { support: "yes", reason: "GOOGLE_API_KEY / ANTHROPIC_API_KEY" }
    auth_file: { support: "no" }
    oauth_token: { support: "no" }
    vertex_ai: { support: "yes", reason: "Vertex AI mode using Application Default Credentials" }
  mcp:
    stdio: { support: "yes" }
    sse: { support: "yes" }
    streamable_http: { support: "yes" }
    project_scope: { support: "no", reason: "core-agent demotes project-scoped MCP to global" }

no_auth:
  behavior: drop-to-shell
  message: |
    This agent started without credentials.
    Set GOOGLE_API_KEY for the Gemini API, or configure Vertex AI.

auth:
  default_type: api-key
  types:
    api-key:
      required_env:
        - any_of: ["GOOGLE_API_KEY", "GEMINI_API_KEY"]
    vertex-ai:
      required_env:
        - any_of: ["GOOGLE_CLOUD_PROJECT"]
        - any_of: ["GOOGLE_CLOUD_LOCATION"]
        - any_of: ["GOOGLE_GENAI_USE_VERTEXAI"]
  autodetect:
    env:
      GOOGLE_API_KEY: api-key
      GEMINI_API_KEY: api-key
      GOOGLE_CLOUD_PROJECT: vertex-ai
